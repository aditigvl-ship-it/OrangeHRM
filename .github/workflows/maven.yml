name: Maven CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Chromium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium

    - name: Build with Maven
      run: mvn -B clean install

    - name: Run tests (headless Chromium)
      env:
        CI: true   # flag for BaseClass to detect CI
      run: mvn -B test -Dheadless=true

    - name: Upload Combined Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |
          target/surefire-reports
          test-output/ExtentReports

    - name: Publish Extent Report to Summary
      if: always()
      run: |
        echo "## 📊 Extent Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The full styled report is included in the **test-reports** artifact." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Generated files:" >> $GITHUB_STEP_SUMMARY
        ls -1 test-output/ExtentReports >> $GITHUB_STEP_SUMMARY
